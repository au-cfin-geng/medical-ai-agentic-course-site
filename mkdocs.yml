  - Foundations:
    - Clinical AI: foundations/clinical_ai.md
    - Medical Imaging Pipeline: foundations/medical_imaging_pipeline.md
    - MRI Basics: foundations/mri_basics.md
    - Brain Tumour Imaging: foundations/brain_tumour_imaging.md
    - Segmentation Basics: foundations/segmentation_basics.md
    - Reproducibility: foundations/reproducibility.md
    - Ethics, Privacy and Safety: foundations/ethics_privacy_and_safety.md
  - MRI Textbook:
    - What Is MRI: mri/what_is_mri.md
