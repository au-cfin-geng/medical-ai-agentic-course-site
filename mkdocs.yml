    - MRI Basics for AI: clinical-ai/mri-basics-for-ai.md
    - Brain Tumour Segmentation: clinical-ai/brain-tumour-segmentation.md
    - Segmentation Pipeline: clinical-ai/segmentation-pipeline.md
    - Evaluation Metrics: clinical-ai/evaluation-metrics.md
    - Error Analysis: clinical-ai/error-analysis.md
    - Clinical Translation: clinical-ai/clinical-translation.md
  - Agentic Research:
    - What Is Agentic Research: agentic-research/what-is-agentic-research.md
    - Claude Code Mental Model: agentic-research/claude-code-mental-model.md
    - Prompts as Experimental Instruments: agentic-research/prompts-as-experimental-instruments.md
    - Roles, Tools, and Skills: agentic-research/roles-tools-skills.md
    - CLAUDE.md — Project Memory: agentic-research/claude-md-project-memory.md
